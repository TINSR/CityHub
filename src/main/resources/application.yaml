server:
  port: 8081
spring:
  application:
    name: hmdp
#TODO配置AI
  langchain4j:
    zhipu-ai:
      chat-model:
        api-key: "f7a12ab079e943b68c342b07e805ba02.fsZw3y9XFX5bBBxZ"
        temperature: 0.6

  datasource:
    # 1. 驱动换成新版的 cj 驱动 (适配刚才改的 pom.xml)
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 2. 数据库依然连接 hmdp，但建议把时区改为上海 (Asia/Shanghai) 避免时间错乱
    url: jdbc:mysql://localhost:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    # 3. 换成你本地的 MySQL 密码
    password: 123456
  spring:
    # ... 其他配置(datasource等)保持不变 ...
    data: # <--- 这里新增了 data 层级
      redis:
        host: localhost
        port: 6379
        database: 0
        lettuce:
          pool:
            max-active: 10
            max-idle: 10
            min-idle: 1
            time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
  pattern:
    dateformat: mm:ss.SSS